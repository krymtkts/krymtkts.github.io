- date: 2026-05-01
  bookTitle: Team Topologies 価値あるソフトウェアを素早く届ける適応型組織設計
  pages: 187 ~ 227
  notes: |
    Part Ⅲ Chapter 8, 9 。絶えず変化を続けるチームタイプとインタラクションモードについて。
    コラボレーションモードでの探索と適切なチーム節理面の発見・分離の繰り返し等。代表的なチーム分割のシグナル。コレで本書は終わり。途中から目が滑る感じがしてあんま理解できてないかもな。
    でもなんとなく世間で人気なのがわかった。 DDD との親和性からも読者が方法論と受け取りそれに従っていけば良いんだという明確な道筋を見出せる点が好まれるのかな。
    経営層や株主のような利益享受者が曖昧な活動を許容しにくいという特性から、説明責任や KPI を持つ経営層や中間管理職からしたら、ちいとぽは銀の弾丸に見えるんじゃないかな。
    しかし、記載されたパターンとインタラクションモードの組み合わせを随時組み換えて組織の成長や市場の変化に適応していく必要があるのは本書でも触れられていて、静的構造だけで多分十分ではない。
    パターンに従えば壊れにくい組織にはなるが、壊れにくさと変化への適応性は別物。更に本書が示す適応性獲得の方向性は兆候で駆動する進化であり、高い不確定性の中では仮説で駆動する進化に比べ後追いになるリスクがある。
    本書が取り扱わない事前的な変化が必要な実践者は、何に気を払うべきなのかを悩むでしょうな。しらんけど。
    わたしが好む組織論は、こういう静的構造と事後的な進化の話よりも、組織の動的な振る舞いと事前的な進化の話なんやろなと、今回理解した。
