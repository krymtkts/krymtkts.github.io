- date: 2026-05-01
  bookTitle: Team Topologies 価値あるソフトウェアを素早く届ける適応型組織設計
  pages: 187 ~ 227
  notes: |
    Part Ⅲ Chapter 8, 9 。絶えず変化を続けるチームタイプとインタラクションモードについて。
    コラボレーションモードでの探索と適切なチーム節理面の発見・分離の繰り返し等。代表的なチーム分割のシグナル。コレで本書は終わり。途中から目が滑る感じがしてあんま理解できてないかもな。
    でもなんとなく世間で人気なのがわかった。 DDD との親和性からも読者が方法論と受け取りそれに従っていけば良いんだという明確な道筋を見出せる点が好まれるのかな。
    経営層や株主のような利益享受者が曖昧な活動を許容しにくいという特性から、説明責任や KPI を持つ経営層や中間管理職からしたら、ちいとぽは銀の弾丸に見えるんじゃないかな。
    しかし、記載されたパターンとインタラクションモードの組み合わせを随時組み換えて組織の成長や市場の変化に適応していく必要があるのは本書でも触れられていて、静的構造だけで多分十分ではない。
    パターンに従えば壊れにくい組織にはなるが、壊れにくさと変化への適応性は別物。更に本書が示す適応性獲得の方向性は兆候で駆動する進化であり、高い不確定性の中では仮説で駆動する進化に比べ後追いになるリスクがある。
    本書が取り扱わない事前的な変化が必要な実践者は、何に気を払うべきなのかを悩むでしょうな。しらんけど。
    わたしが好む組織論は、こういう静的構造と事後的な進化の話よりも、組織の動的な振る舞いと事前的な進化の話なんやろなと、今回理解した。
- date: 2026-05-02
  bookTitle: 運動能 新版・一流の頭脳
  pages: 1 ~ 27
  notes: |
    運動が脳を強くする話。ストレス・集中力・意欲・記憶力・アイデア・学力・健康みたいな切り口の章立て。
    わたしも脳と健康のために平日は自重筋トレするので、本書からさらなる何かヒントを得たいなと思ってる。
    特に科学的な裏付けがあってそれを示してるみたいなのでその点に期待している。
    万が一認知能力への効果に再現性がないにしても、運動して悪いことはなかろうというのがまたいいな。
    章立てを見ると学力だけ総合力で粒度が整ってない気がするがそんなもんなんかな。
- date: 2026-05-03
  bookTitle: 運動能 新版・一流の頭脳
  pages: 28 ~ 58
  notes: |
    第 1 章。現代人は進化の程度では原始人と変わりがなく、脳は体を動かすことに最適化されたまま。
    科学的根拠<要出典>でも定期的なウォーキングが認知能力を高めることが示されている。
    神経可塑性を促すのが運動である、という話。
    残念ながら具体的な研究結果を示してるとか脚注がなく裏付けを得ることが出来なかったので、そこは自分で調べる必要があった。
    本書で言及がある MRI 以外に RCT(ランダム化比較試験)など複数の研究で効果は認められている。
    ただ効果の大きさ・条件・一般化可能性については相当の不確実性があって、「運動により脳に何らかのポジティブな効果が見られる」という程度の理解に留めるのが妥当っぽい。
- date: 2026-05-04
  bookTitle: 運動能 新版・一流の頭脳
  pages: 59 ~ 112
  notes: |
    第 2 章。運動がストレスを抑制する。
    HPA(視床下部・下垂体・副腎軸) 軸のメカニズムがコルチゾールを発生させストレスにつながる。
    ストレスは扁桃体を刺激し更なるストレスにつながる。扁桃体は恐怖や不安に敏感で、ストレスの悪循環を引き起こす。
    海馬と前頭葉は扁桃体の活動を抑える働きをするが扁桃体の方が強い。また継続的なストレス下では物理的に萎縮してしまう。
    継続的な運動はコルチゾールレベルを下げ、海馬と扁桃体のブレーキ性能を高める。
    歩くより走るの方がコルチゾール抑制の効果が高いみたいだが、あまり汗かきたくないねんよな。今の筋トレを細かくやるのは汗をかき過ぎないから続けられてるのもある。
- date: 2026-05-05
  bookTitle: 運動能 新版・一流の頭脳
  pages: 113 ~ 162
  notes: |
    第 3 章。運動が集中力を高める。
    具体的にいうとドーパミンの分泌を促すことが脳内のノイズを抑制し報酬系をくすぐる、また前頭葉の機能を高めることが集中力を高めることに繋がる。
    また ADHD の特性について丁寧に触れてる。注意散漫や多動性といった特徴は狩猟民族や遊牧民族には適したもので現代の定住社会では不適応であるが、運動が ADHD の症状を緩和することが示されている。
    エリクセン・フランカー課題は個人差の信頼性が低い点、マシュマロ課題は良く知られたように長期予測の信頼性が低い点があるが、運動が集中力を高めることは示唆されてるってことかな。
- date: 2026-05-06
  bookTitle: 運動能 新版・一流の頭脳
  pages: 163 ~ 207
  notes: |
    第 4 章。うつとモチベーションと運動。
    うつの改善に運動が効く。運動は抗うつ剤のビジネス的な事情で存在感が薄い。セロトニン・ノルアドレナリン・ドーパミンの分泌を促すことがうつの改善に繋がる。
    BDNF(脳由来神経栄養因子) の分泌も促すことが海馬の脳細胞の新生を促しうつの改善に繋がる。
    あとランナーズハイとその要因と考えられるエンドルフィンと内因性カンナビノイドの話。体脂肪を燃焼したときにレプチンが分泌されることから空腹感がゾーン入口の合図であるという自説。
    本書の主張する、脳のある機能が原始時代の何かに恐らく由来してる、というのはまあそうかも知れんなくらいで読むのが良さそう。事実として運動が認知機能を高めるとしても、原始時代の何かとの因果関係まではやり過ぎではなかろうか。
    裏付けがわからんのでそうなんだという程度の理解に留めてる。うつ改善の効果については本当に本書が示すように何百ものモチベーション研究で示されてるのであれば信頼性は高いんやろな。
- date: 2026-05-07
  bookTitle: 運動能 新版・一流の頭脳
  pages: 208 ~ 250
  notes: |
    第 5 章。運動が記憶力を改善する。
    運動が BDNF を増やし海馬の成長を促し、また運動が海馬への血流量を増やすことで、記憶力を改善する。これは運動性記憶、つまり運動神経にもきく。
    ただし適度な強度の運動でないと疲労で逆に記憶力は下がる。
    海馬の細胞の新生は四六時中行われているが、それを加速するのが運動。海馬は最も運動の恩恵を受ける部位。脳トレでゲームはうまくなっても認知能力は上がらない。
    どうもポピュラーサイエンス本みたいだし、調べた感じ原著には参考文献はあったぽいが何故か今の新版では？なくなってるしで(何故)、「まあせやな」という理解でやはり正しい気がする。
    ここまで「すごい効果があるからとにかく走れ」という感じ。ある意味首尾一貫してる。
- date: 2026-05-08
  bookTitle: 運動能 新版・一流の頭脳
  pages: 251 ~ 280
  notes: |
    第 6 章。運動が創造性を高める。歩くことが発散的思考を強化する。収束的思考は上がらなかった。
    歩くより走る方、負荷が適度に高い運動が効果が高いと考えられる。 30 分程度の運動で効果は 1 ~ 数時間。脳の血流量が重要なため過度の疲労で脳血流量が下がると衰える。
    創造的なアイデアを有無には地道な粘り強い努力が必要で、それを運動で養える(何となく分かるが根拠は？)。
    視床が情報をフィルタリングするにはドーパミンの分泌が適正でないといけない。視床のフィルターがより多くの情報を通すと創造性か統合失調症のどちらかに繋がる。
    それを分岐させるのは視床以外の脳が正常に機能することが条件と考えられており、脳のあらゆる部位を改善する運動が意図的に創造性を高める素地を作る可能性がある。
    創造性と散歩の関係はクリエイティブプログラマーでも触れられていた。創造性と統合失調症の関係はスペクトラムという話と思うがこれは要検証やな。参考文献がないから地道に探るしかないか。
- date: 2026-05-09
  bookTitle: 運動能 新版・一流の頭脳
  pages: 281 ~ 309
  notes: |
    第 7 章。運動が子供の学習効果を高める。子供の潜在能力を発揮するには運動しなければならない。心拍数の上昇が重要な要素。
    大人子供問わず立ち机を使うことで前頭葉が活発化し脳が効率よく働く。
    「18 歳時に体力に恵まれていた子供は学歴・収入・うつ病のリスクの低さでより良い結果を得る傾向がある」という節があるが、これは素人目に見ても再現性の危機やな。
    わたし自身体力・運動神経ともにゼロだった当事者なのでバイアスがあるかも知れんが、マシュマロ課題なんかと同様の匂いがする。
    子供に運動させたい気持ちは親としてもあるので理解はできるしそういう傾向があるのかも知れないが、こういった言い切りに学術的な裏付けが明示されないのは別問題だ。
    これが著者のせいか出版社のせいかは知らんがな。
- date: 2026-05-10
  bookTitle: 運動能 新版・一流の頭脳
  pages: 310 ~ 328
  notes: |
    第 8 章。老化により前頭葉が萎縮するのを運動が抑制する。
    また3人に一人が海馬が萎縮する遺伝子を持つ可能性があり、それに抗い BDNF を確実に増やす方法が、運動。
    歩くことが認知症の発症率を抑える。ブルーゾーンは日常の範囲で体を動かすことが長寿に繋がっている可能性。
    ストループテスト自体はかなり長く使われてきた頑強なテストみたい。
    多分この章で注意すべきは、ある研究の結果を過度に一般化するとか、運動が一要因であることを忘れて過度に強調することとか、そういう点やろな。
    運動が老化による認知機能や記憶力の低下を抑制する一要因であって他にも要素はある、と理解するのが妥当なところやろな。
- date: 2026-05-11
  bookTitle: 運動能 新版・一流の頭脳
  pages: 329 ~ 368
  notes: |
    第 9 ~ 10 章。脳が身体活動によって恩恵を受けられるのは何故か、に関する著者の自説と思われる内容。
    大脳皮質、特に前頭前皮質の発達が適期応力を高め生存に有利に働いたと考えられる。基本的に移動する生物に脳があるのを考えると、体を動かさないことで脳に影響がないわけがない。
    脳が原始時代のまま運動しないよう変わってしまった環境の矛盾が、現代人の心や体を蝕む原因。サプリ・脳トレといった巨額の利益が絡むものは置いといて運動しよう、ということころかな。
    主張はわかるので、他の研究に基づいた本なんかを読みつつ、本書の主張をそのまま飲み込まず参考文献を眺めて過度な一般化なのか見極めていくのが読者に与えられた試練やな。
    そして、まとめの中で遂に参考文献の URL が出てきた。ほんの少しだけ安心できる。しかしなんでこのたかだか数ページを本書に含めるのをケチったのか謎。
    サラッと AI に見させた感じでは、定期的な有酸素運動が高齢者の認知機能低下を遅らせ、うつ予防・海馬や認知機能に中程度の効果があるのは比較的信頼性高く、他の創造性とかは注意が必要みたいな感じらしい。せやろな。
    これで本書は終わり。筋トレより有酸素運動、歩くよりも走れ、という論調だったので次は筋肉のやつ読むか。
- date: 2026-05-12
  bookTitle: 筋肉がすべて 健康・不老・メンタル、人生のすべてが変わる唯一の方法
  pages: 1 ~ 28
  notes: |
    INTRODUCTION 。著者の研修医としての 2 型糖尿病・心血管疾患・肥満治療の経験、老年医学の専門研修医としての経験から、脳や体の健康に与える健康被害、脂肪を減らすことより必要な筋肉の重要性に着目した。
    積極的な運動と高品質なタンパク質の食事に重視した著者の編み出したライオン・メソッド(多分翻訳前は The Lyon Protocol)とその裏付けとなる最新の筋肉の常識を本書で示してくれるみたい。
    あと成長マインドセットに触れて、「楽な方法がある」という甘い幻想は捨てて地道な努力を積むことが究極のライフハックであると締めてる。
    脳筋過ぎる邦題だが、運動脳の走る・歩く推しに対して筋肉推しの本書は好敵手と思われたので読む。
    原書は Forever Strong™: A New, Science-Based Strategy for Aging Well なので邦題より多少マシか。
    目次を読むに、 Part 1 が筋肉、 Part 2 が栄養、 Part 3 で食事と運動、という構成みたいで、 1,2 でメソッドの基礎知識を養う感じかな。
    バイアスやエビデンスへの注意を促す節もある様子は親切か。
    著者が昔ホールフードばっか食べてたとか独自メソッドの構築とかは個人的に見てヤバげなシグナルだが、知る限り健康寿命で筋肉が重要なのは確かだしバイアス抜きで読みたい。
- date: 2026-05-13
  bookTitle: 筋肉がすべて 健康・不老・メンタル、人生のすべてが変わる唯一の方法
  pages: 29 ~ 55
  notes: |
    Part 1 第 1 章。筋トレを伴わない有酸素運動は筋肉も減らしてしまう。骨格筋が有無生理的な影響が健康につながる。
    筋肉が増えることの利点。ミトコンドリアの密度が増し炭水化物や脂肪を効率良くエネルギーに変換、代謝を最適化できる。
    炎症を抑えるマイオカインの放出にもつながる。筋肉はアミノ酸の貯蔵庫で、代謝において体内へアミノ酸を供給する役割を担う。
    運動によって BDNF が増えるというのが本書もあるが、調べてみると人間の脳の局所的な BDNF を測ってないようだし運動以外の要因もあるから必ずしもそうではないぽい。海馬の成長を促すのは確からしいが動物研究の結果であって人間で証明したものではなさそう。
    いくつか注意すべき主張はありそうだが、骨格筋を増やすメリットは確からしいと理解した。
- date: 2026-05-14
  bookTitle: 筋肉がすべて 健康・不老・メンタル、人生のすべてが変わる唯一の方法
  pages: 56 ~ 77
  notes: |
    Part 1 第 2 章。筋肉を自分の意志で鍛えられる唯一の臓器とみなし、何のために筋肉を鍛える必要があるのかの説明。
    老化による筋肉の分解に対抗する。免疫の強化。体を補修するためのアミノ酸の供給源。運動量と自己免疫疾患の関係。
    過剰な脂肪組織による慢性的な炎症による DNA 損傷を防ぐ。がん治療での生存率の向上。肥満と認知症の関係。
    筋肉を増やしミトコンドリア密度を上げエネルギー代謝を最適化することが健康寿命につながる。
    つい最近がん患者の運動の話は最近の医療事例で見たな。
    ウエストが太いと脳の容量が小さいとか認知症が多いというのは因果関係がよくわからなかったのであとで検証しよう。
- date: 2026-05-15
  bookTitle: 筋肉がすべて 健康・不老・メンタル、人生のすべてが変わる唯一の方法
  pages: 78 ~ 112
  notes: |
    Part 1 第 3 章。老年医学の専門家なのもあってかこの章では老化に備えるための筋肉の増量について触れられてる。
    子供の頃から筋肉を鍛えること適切な食事を取ることで得られる健康と認知能力への好影響について。
    30 代から始まる老化に対抗するための筋トレの必要性について。肥満が女性の妊娠において妊娠糖尿病を引き起こすリスク。男性の生殖能力も運動で好影響を受ける。
    更年期のホルモンバランスの変化で急激に筋肉が減少する。それに対抗するための高タンパクな食事と運動の週間の必要性。
    筋トレを始められないヒトのための「メンタルの筋トレ」について。現状維持バイアスでトレーニングを始められないというのはあるあるやな。
    ネガティブな未来を想像するとか自分に罰を与えるとかは置いといて、個々人にあった習慣化の条件付けが必要なのは確かだ。
    妊娠糖尿病や更年期障害にも筋肉の影響が大きいというのは気づきやな。医学のリテラシーがないから情報をそのまま飲み込んでいるので、また個別に調べておきたい。
- date: 2026-05-16
  bookTitle: 筋肉がすべて 健康・不老・メンタル、人生のすべてが変わる唯一の方法
  pages: 113 ~ 153
  notes: |
    Part 2 第 4 章。適切な栄養を摂取する手段としての動物性タンパク質。
    栄養学自体はまだ歴史が浅く、最近の研究で却下された知見も多いが、米国の標準食への影響は未だ強い。
    そのバイアスは、栄養学の研究が元は軍事目的であったこと、科学的根拠に基づかない市場の影響と様々。
    ヒトの体は効率よく動物性タンパク質を利用でき、それを植物性タンパク質で補うのは難しい。
    あと畜産に対する環境負荷や倫理的な問題に対する反論。
    ハードなトレーニングのような計画を実行するため、事実を受け入れ次のステップに進むために自尊心を高める。
    エビデンスの信頼性に対する注意喚起し、流行と科学を区別するように促しているのはよい。
    動物性タンパク質の摂取に関しては詳しく知らなかったのでさっと調べたが、人種的な食事の適性も多少あるようだけど、生物学上は動物性タンパク質の方が効率的に利用できるのは確からしいと理解した。
- date: 2026-05-17
  bookTitle: 筋肉がすべて 健康・不老・メンタル、人生のすべてが変わる唯一の方法
  pages: 154 ~ 182
  notes: |
    Part 2 第 5 章。タンパク質は肉体の物理的な構造・生理的な働きを支える原材料。
    高品質なタンパク質の摂取とは必須アミノ酸の十分な量とバランスが取れていること。タンパク質の量が多くても質が同じではない。
    単体で必須アミノ酸を摂取できなくても組み合わせることで補うことができるが、それでも動物性タンパク質に比べアミノ酸の量が不足する可能性がある。
    筋肉を作るためには、朝食に代謝の最適化を始めるため、夕食に朝までの断食に備えるための十分な量のタンパク質を摂取することが重要。運動後のタンパク質摂取も重要。
    最後に過食に関するドーパミンの話。
