    予定通りに完成すると思ってたのも楽観的だ。ここまで大規模なプロジェクトなら読めない範囲の方が広く、断言するのは無責任。
    実際絞め殺しパターンのようなシステムを少しずつ置き換えるというのは結構難しく内製が基本だが、ヒトの入替が常な IT ゼネコンプロジェクトではうまく出来なくて、安易なビッグバンリリースになった説が有力かな。
    この点でも想定している刷新後のシステム管理体制の組織的な脆弱さが見えてる気がする。
    障害があったから大規模な刷新計画に踏み出せたあたり、危機感を煽る方法でしか決断を迫れなかった様に見えて、主体性の無さを感じる。
    また勘定系における COBOL の強さは decimal を使う観点からもよく分かるが、旧システムのブラックボックス化が危機の始まりだというところに、長期的に見て希少となる COBOL を中核に据えるのは、旧システム同様の高リスクをはらむのではないかと思った。
