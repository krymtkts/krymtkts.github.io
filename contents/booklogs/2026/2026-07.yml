- date: 2026-07-01
  bookTitle: 部下としての AI 世界一流エンジニアの進化術
  pages: 189 ~ 216
  notes: |
    第 5 章。ここで言うセンスは対象への解像度の高さである。解像度を高める助けに AI を使うという話。
    その解像度の高さがソフトウェアサービスであれば、問題解決✕ユーザー理解✕過渡に提示速度、と定義している。
    最小の努力で最大の効果を出す。 Be Lazy 。その楽をするために頑張る。その頑張りを AI は補助できるのでもっと楽に実現できる。
    新 Be Lazy が出た。 AI を効率的に使うために認知負荷耐性を高める、と同じで努力のコストを下げることが重要なんやろな。
    楽になった分新しくできる仕事ややれることを詰めてしまうのが悩みどころか。
    また AI Agents へオフロードしても、指示やレビューみたいなヒトの判断がいる部分が大量に積み重なりじわじわ消耗するので、そこは耐性高めるしかないのかな。
    詰め込むなって話かも知れんが。
- date: 2026-07-02
  bookTitle: 部下としての AI 世界一流エンジニアの進化術
  pages: 217 ~ 244
  notes: |
    第 6 章。必然的に脳の疲労が溜まりやすい AI 時代に合わせた心身の最適化。疲労にあわせた自分のペースを作る。
    運動。習慣化による自動化で判断を減らす。そして健康を守ること。 ADHD などの認知特性や自分の「楽しい」にあわせた集中しやすい環境・週間作り。ルーチンなど。
    判断を減らすのはわたしも結構続けてる。朝昼は基本固定、服もメタ T で固定。それでも子育てや家事で判断を消費するから中々難しい。
    運動や健康といったテーマも、自分がこれまで読んできた運動・健康・脳等の本の裏付けもあるからすんなり納得いくけど、本書の巻末に参考文献がないのが残念やな。
    認知特性に合わせるというのもよく分かるな。わたし自身も発達障害のグラデーションの何処かにいるので、アダプトゲン等も含め、自分の特性を活かしたり調整したりはかなり気を使ってる。
    そういう意味ではリモートワークは仕事・家事・運動・読書・音楽をいつやるか融通を最大限利かせられる点でハマってる環境なんやろな。
- date: 2026-07-03
  bookTitle: 部下としての AI 世界一流エンジニアの進化術
  pages: 245 ~ 280
  notes: |
    第 7 章。 AI 時代に必要なのは予測よりも変化に対応する能力。本人の基本能力が AI を使いこなせることで初めてブーストされる。基本能力が低いと Slop 化。 AI の出力を鵜呑みにせず、 AI を使い倒しても品質に妥協しない。
    「AI を使う」という変化への適応はリスクを取って挑戦することに近い。(現在の)AI は新しいものを生み出せないからヒトのクリエイティビティが重要になる。
    変化への適応力という文脈でいえば TEAM OF TEAMS でいわれるような不確定要素への対応で必須やねんよな。予測が無駄というのは危ういと思う。予測も事実に基づいて調整していくだけやからな。いつでも動けるよう備える。
    いまの AI では Human-in-the-Loop が品質保証に必要だが、これも変わるだろうし今現在に順応仕切るのも本質じゃないんやろな。
    どんな道具がでてきても使いこなせるだけのバイタリティは基礎に支えられてるから、そこを見据えたゆとりと学び続ける姿勢の重要性を今の AI は示唆してるんやろう。しらんけど。
    わたしも AI の登場で知らない知識へのアクセスが広がって思考が拡張された。
    また仕事用にエラーログから issue/PR 作成する Agents を作り協働してる。
    これらを通してヒトがボトルネックであるのを噛み締めてるけど、それでも従来比でも速くなった。今後も変化に適応する限りブーストされ続けるんやろな。
    本書はコレで終わり。 AI How to 本になりそうやったが最後の章で変化への適応力がでてきたり、ブログの内容に付加されるものが色々あって、よかった。ディープブルースの話含め、ブログのいろんな記事をまとめた形になってて面白かった。
- date: 2026-07-04
  bookTitle: 働きたくないイタチと言葉がわかるロボット
  pages: 1 ~ 32
  notes: |
    ことのはじまり ~ 1 章。「何か言うだけで何でもできるロボット」を考えるには「言葉がわかる」仕組みを理解する必要がある。
    「言葉がわかる」というために少なくともできないといけないこと、少なくとも何と違うのか。
    イタチが欲しいのは AGI 的なロボットでそのためには何が必要化みたいな流れ。
    1 章では音声と音素の話。「ある言語が聞き取れる」ことは「音声のカテゴリ(音素)化の仕方」がわかり「音声と音素を結びつける」こと。
    機械学習が使われる領域。音声と音素をつなげるのは関数で、その関数を訓練データから導く。
    人間の赤ちゃんと機械による音声理解の違いは正解がないこと。音声の分析・音素の学習・単語の学習が同時進行する。
    今では LLM が音声もかなり理解できるようになったので、深層学習の進化ということかな。でも初めの頃は英語以外の学習データが乏しいでモデルは性能悪かったし、この章で言われる通りなのかな。
- date: 2026-07-05
  bookTitle: 働きたくないイタチと言葉がわかるロボット
  pages: 33 ~ 52
  notes: |
    2 章。自然な会話ができるには必ずしも言葉を理解している必要はない。
    ELIZA のようなルールベースやウム返し、りんなのような機械学習による返答。
    自然な会話はあいまいなまま進む。真偽が問われる会話とは根本的に異なる。
    出版が結構前なのでりんなみたいな懐かしいキーワードが出てくるな。
    LLM 時代になって AI のできることが随分様変わりしてるけど、 AI が確率的な推論をしてることは同じなので、 AI を理解する助けになりそう。
- date: 2026-07-06
  bookTitle: 働きたくないイタチと言葉がわかるロボット
  pages: 53 ~ 70
  notes: |
    3 章。質問に正しく答えることは言葉の世界の中での正しさであって、実際に体験していないことでもその情報の信憑性から正しいと判断される。
    質問応答。 IBM Watson 。懐かしい名前だなと思って調べたらまだ Watson 自体は続いてて watsonx とかいうのになってるのか。
    ヒトの理解も機械と同じってのは面白い。確かに体験したことのないものでも知っていてわかってるつもりになってる。
