- date: 2026-03-01
  bookTitle: ピクサー流 創造するちから 小さな可能性から、大きな可能性を生み出す方法
  pages: i ~ viii, 1 ~ 18
  notes: |
    序章まで。エド・キャットムルがピクサーで Toy Story を作って夢を実現した後、感じていた空虚に関する答え。
    なぜシリコンバレーのリーダーたちがつまらないミスで足元を掬われたのか、その破壊的な力から創造性を発揮する組織を守り、それを維持するために何をすべきか。
    買ったもののページ数がゴツいので積んでたが、読み始めた。最近読んでいた本とは違うかなと思って。ただ読み始めたらこれはマネジメントの本だ。
    不確実性と向き合いリーダーがリスクを取って従業員の自律性を引き出し創造性を発揮させる。失敗は率直に認め学びにつなげる。
    これはこれでつながりがあって面白いから読み進めてみる。
- date: 2026-03-02
  bookTitle: ピクサー流 創造するちから 小さな可能性から、大きな可能性を生み出す方法
  pages: 20 ~ 43
  notes: |
    第 1 章。 Pixar に至るまでの昔話。氏がコンピューターグラフィックスでアニメーションを描くことを志すようになったところまで。
    氏が Pixar で再現しようとしたのがユタ大学にいたアイヴァン・サザーランド、デイブ・エヴァンスの元にいた時の自律したコラボレーションという。
    アラン・ケイ等同級生の存在が刺激となった点に触れられている。 ARPA も過度な管理をせず自律性に任せて技術革新を待つというスタイル。
    古くから自律と創造の関係性は知られていたということかー。それに氏自身もコンピューターグラフィックスの偉人なんやな。全く知らなかったので勉強しよう。
- date: 2026-03-03
  bookTitle: ピクサー流 創造するちから 小さな可能性から、大きな可能性を生み出す方法
  pages: 44 ~ 74
  notes: |
    第 2 章。 Pixar 誕生。 NYIT -> ルーカス・フィルムのコンピュータ部門 -> Pixar 独立。
    技術革新を社外へも共有する透明性を保つことで学会や人とのつながりを生んだ。
    場所の移り変わりで氏の管理スタイルも変わっていく。大学院ぽさからは少し垢抜けて、研究所といえども利益追求企業の緊迫感を受けた体制に。
    完全フラットから、性能もバラバラな大規模な組織をまとめるため権限移譲をしつつも部分的な階層構造。
    ただし最高の人材を周りに置くという点では変わりない。アルヴィ・レイ・スミスとジョン・ラセターもその中で繋がった。
    難しい管理の手本もない中、ジョージ・ルーカスの長期的視野でまだ見ぬ世界を追い求めるスタイルから学んだ。
    Pixar という名前もここで生まれた。 Pixer + Radar 。
    そしてコストカットの波を受けてスティーブ・ジョブズに買収され独立。
    Pixar たらしめる組織運営にはマネジメントの本で学んだ原則が多く出るが、こういうインパクトの強い関わりのある人達がその原則を体現していた影響も大きいんやろな。
- date: 2026-03-04
  bookTitle: ピクサー流 創造するちから 小さな可能性から、大きな可能性を生み出す方法
  pages: 74 ~ 100
  notes: |
    第 3 章。ハードウェア会社から映画会社へ。その過程で学んだこと。
    デミングの教えとそれを実践していた日本企業から作業員が積極的に製品に関与する重要性を学ぶ。
    短編映画などの評価と違いハードウェアは赤字を抜け出せなかった。その間ジョブズとの仕事は大変だったが次第に仕事の仕方がわかっていく。
    ディズニーとの映画三作品の契約、最初の Toy Story で夢を実現した氏は喪失感を覚えた。
    しかし制作に集中するあまり社内の溝を見逃していた。偉業に携わっているという良い側面が社内の派閥といった悪い側面を隠していた。
    その改善、問いかけを続ける創造的な企業文化を育て上げることが氏の新たな挑戦となる。
    氏は元がアカデミックな人なので、人と人の関わりという難しい問題を理解し改善することは、知的好奇心を刺激する面白い挑戦だったのかもしれないな。
    ジョブズと Toy Story といえばラリー・エリソンが Toy Story の試作品を見せられまくって気が狂いそうになった話好きやな。狂気の情熱が伝わる。
- date: 2026-03-05
  bookTitle: ピクサー流 創造するちから 小さな可能性から、大きな可能性を生み出す方法
  pages: 101 ~ 122
  notes: |
    第 4 章。ピクサーらしさ。
    Toy Story 2 は成功したが、ビデオ作品を劇場作品に変更し短期間で作品を作り直す必要があったたため過重労働が続いた。
    その失敗の中で学んだこと。あらゆる創造的な試みの決め手になるのが人、その仕事のやり方、才能、価値観にこだわること。
    それも個人でなくチームのレベルで。アイデアも人が生み出すものなので人の方が重要。一流のアイデアを二流のチームが台無しにするが、その逆はない。
    社員の健康管理も重要な仕事で、特に情熱ある人の継続的な過労で消耗することを防ぐ。社員の幸せを大切にすることは長期的な利益になる。
    Toy Story が成功した頃の Pixar が学んだ「物語が一番偉い」「プロセスを信じよ」という原則は間違いではないが、信じるべきは行動する人であり言葉自体に価値はない。
    Pixar の名のつく作品に品質の妥協はしない。これが変化を厭わない内省の文化に繋がった。
    人とチームが重要というのはもう散々マネジメントの本で見て来たことと同じだ。そういうチームに自律性を持たせると勝手に動き出すんだ。
    しかしビジネス的には大成功していてもそれに甘んぜず、そのプロセスを改善対象にできるのはすごいな。これは氏のリーダーとしての積み重ねの結果だろう。
- date: 2026-03-06
  bookTitle: ピクサー流 創造するちから 小さな可能性から、大きな可能性を生み出す方法
  pages: 123 ~ 150
  notes: |
    第 5 章。率直な意見。
    熟練の優秀なメンバー(ただし作品に対する権限を持たない)からの率直な意見が作品を改善する。 Pixar ではブレイントラストと呼ばれる会議。
    意見を受ける側も、その意見が自分に対してでなく作品の問題に対してであるという分離ができているからこそ意見を真摯に受け取れる。
    複雑で創造的なプロジェクトを引き受けた誰もが途中で全体を見通せなくなる。そのとき率直な意見が見直すきっかけになる。
    途中で「変え三六〇度変え」ってのが出てくるが一周してまうやんけと思った。誤植か元からの間違いか。
    ブレイントラストでは、意見で自分が傷つけられることがないという心理的安全性(わたしは好きな言葉ではない)が確保されているため、有効に機能するのだろうな
    誰しも訓練なく問題と自分を切り離すのは難しい。組織文化や情熱がそれを乗り越える鍵になるんやろな。要は忌憚なきレビューってことで IT 業界でも数は少ないがあるにはある。
    最後の頁にあった「廊下で率直な会話がなされる会社は要注意」はほんとその通りで、会議で率直な会話ができないのは構造的な問題がある認識。会議こそ率直に話せよ。
- date: 2026-03-07
  bookTitle: ピクサー流 創造するちから 小さな可能性から、大きな可能性を生み出す方法
  pages: 151 ~ 179
  notes: |
    第 6 章。失敗と恐怖心。
    失敗への恐れを減らすにはできるだけ早くリスクが小さいうちに失敗する。メンバーの恐れを減らすにはリーダーが率先して失敗を許容し前進する姿勢を示す。
    失敗の対象と自分を切り離す。実験的な作業の失敗を重ねることで着実に一歩ずつ進んでいると捉える。
    ただ失敗させるのでなく、師弟のように熟練者から次の世代への教育も必要。自然には育たない。
    マネジメントに不安はつきものだが、自分のあるべき像でなくチームが機能しているなら、管理方法は間違っていない。リスクを無くすのでなく問題が起こってもメンバーが解決できることを信じる。
    失敗を許容する文化はマネジメントの本でもよく出る。興味深かったのは、失敗をどこまで許与するかのラインをクルーの監督に対する信頼が失われるまでとする点。 IT ビジネスではそこまで我慢できないから、ほぼ見ないのでは。
    失敗の時間的な許容度が違うのかな。でも本当に失敗できない場合についても触れられていて、単に失敗に肝要な一般論とは違うなと思った。
    最後の「マネジメントの仕事は、リスクを防止することではなく、立ち直る力を育てること」素晴らしいな。失敗を許容する文化とレジリエンスを明確に示しているのは初見のような(これまでの本を読みきれてない可能性もある)。
- date: 2026-03-08
  bookTitle: ピクサー流 創造するちから 小さな可能性から、大きな可能性を生み出す方法
  pages: 180 ~ 198
  notes: |
    第 7 章。野獣と赤ん坊。
    貪欲な野獣は成長拡大、売上目標、効率化、局所最適など、本来の目標の二次的な目標といったもの。
    対して醜い赤ん坊は生まれたてで不格好な新しいアイデアといった創造性を指す。
    こういった組織に住む野獣は貪欲で、何もせずにいると赤ん坊を簡単に殺ししまう。だから保護が必要。
    保護は隔離環境で守るのではない。親鳥がひなが巣立つまで見守るようなもの。
    ビジネスでは往々にして可能性は潰されがちな気もするな。
    あるとすれば、現場の裁量で自律的に進めたテーマが花開くみたいなもんか。これも信頼と自律あってこそのもの。
- date: 2026-03-09
  bookTitle: ファスト&スロー あなたの意思はどのように決まるか？
  pages: 74 ~ 93
  notes: |
    3 章。セルフコントロールと知的度量は共にシステム 2 を利用するため、システム 2 が忙しいとシステム 1 が顔を出す。ただしフローだとか強力なインセンティブがある場合は自我消耗に抵抗できるといった例外もある。
    ブドウ糖をの話は再現性がないと後に訂正されている。またマシュマロ課題も習慣と脳の科学で再現性危機として触れられてた記憶がある。
    後の研究を知っていることで引っかかったときにこのようにできるのは良いことだが、本書に書かれている内容が最新の結果でどうかを常に疑いながら読まないといけないのは大変だな。
- date: 2026-03-09
  bookTitle: ピクサー流 創造するちから 小さな可能性から、大きな可能性を生み出す方法
  pages: 199 ~ 224
  notes: |
    第 8 章。変化と偶発性。
    変化を恐れ排除するということは可能性を排除すること。偶発性は予測不能性を持つ。
    今があるのは能力によることもあるが同時に多くの偶発的な要素があってのこと。
    創造性とは偶発的に発生する変化へ適応した結果生まれる。これいいな。
    小さな問題と大きな問題は確率過程の自己相似性があり区別できるものではなく、小さな問題が大きな問題になることもある。
    これは考えてることと同じで驚いた。小さなゴミ掃除もこまめにやらないと重大な問題を見逃したりいつか存続を脅かすようになる。
    この構造はなかなか理解を得られないが本質よな。
