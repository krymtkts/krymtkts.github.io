- date: 2026-03-01
  bookTitle: ピクサー流 創造するちから 小さな可能性から、大きな可能性を生み出す方法
  pages: i ~ viii, 1 ~ 18
  notes: |
    序章まで。エド・キャットムルがピクサーで Toy Story を作って夢を実現した後、感じていた空虚に関する答え。
    なぜシリコンバレーのリーダーたちがつまらないミスで足元を掬われたのか、その破壊的な力から創造性を発揮する組織を守り、それを維持するために何をすべきか。
    買ったもののページ数がゴツいので積んでたが、読み始めた。最近読んでいた本とは違うかなと思って。ただ読み始めたらこれはマネジメントの本だ。
    不確実性と向き合いリーダーがリスクを取って従業員の自律性を引き出し創造性を発揮させる。失敗は率直に認め学びにつなげる。
    これはこれでつながりがあって面白いから読み進めてみる。
- date: 2026-03-02
  bookTitle: ピクサー流 創造するちから 小さな可能性から、大きな可能性を生み出す方法
  pages: 20 ~ 43
  notes: |
    第 1 章。 Pixar に至るまでの昔話。氏がコンピューターグラフィックスでアニメーションを描くことを志すようになったところまで。
    氏が Pixar で再現しようとしたのがユタ大学にいたアイヴァン・サザーランド、デイブ・エヴァンスの元にいた時の自律したコラボレーションという。
    アラン・ケイ等同級生の存在が刺激となった点に触れられている。 ARPA も過度な管理をせず自律性に任せて技術革新を待つというスタイル。
    古くから自律と創造の関係性は知られていたということかー。それに氏自身もコンピューターグラフィックスの偉人なんやな。全く知らなかったので勉強しよう。
- date: 2026-03-03
  bookTitle: ピクサー流 創造するちから 小さな可能性から、大きな可能性を生み出す方法
  pages: 44 ~ 74
  notes: |
    第 2 章。 Pixar 誕生。 NYIT -> ルーカス・フィルムのコンピュータ部門 -> Pixar 独立。
    技術革新を社外へも共有する透明性を保つことで学会や人とのつながりを生んだ。
    場所の移り変わりで氏の管理スタイルも変わっていく。大学院ぽさからは少し垢抜けて、研究所といえども利益追求企業の緊迫感を受けた体制に。
    完全フラットから、性能もバラバラな大規模な組織をまとめるため権限移譲をしつつも部分的な階層構造。
    ただし最高の人材を周りに置くという点では変わりない。アルヴィ・レイ・スミスとジョン・ラセターもその中で繋がった。
    難しい管理の手本もない中、ジョージ・ルーカスの長期的視野でまだ見ぬ世界を追い求めるスタイルから学んだ。
    Pixar という名前もここで生まれた。 Pixer + Radar 。
    そしてコストカットの波を受けてスティーブ・ジョブズに買収され独立。
    Pixar たらしめる組織運営にはマネジメントの本で学んだ原則が多く出るが、こういうインパクトの強い関わりのある人達がその原則を体現していた影響も大きいんやろな。
- date: 2026-03-04
  bookTitle: ピクサー流 創造するちから 小さな可能性から、大きな可能性を生み出す方法
  pages: 74 ~ 100
  notes: |
    第 3 章。ハードウェア会社から映画会社へ。その過程で学んだこと。
    デミングの教えとそれを実践していた日本企業から作業員が積極的に製品に関与する重要性を学ぶ。
    短編映画などの評価と違いハードウェアは赤字を抜け出せなかった。その間ジョブズとの仕事は大変だったが次第に仕事の仕方がわかっていく。
    ディズニーとの映画三作品の契約、最初の Toy Story で夢を実現した氏は喪失感を覚えた。
    しかし制作に集中するあまり社内の溝を見逃していた。偉業に携わっているという良い側面が社内の派閥といった悪い側面を隠していた。
    その改善、問いかけを続ける創造的な企業文化を育て上げることが氏の新たな挑戦となる。
    氏は元がアカデミックな人なので、人と人の関わりという難しい問題を理解し改善することは、知的好奇心を刺激する面白い挑戦だったのかもしれないな。
    ジョブズと Toy Story といえばラリー・エリソンが Toy Story の試作品を見せられまくって気が狂いそうになった話好きやな。狂気の情熱が伝わる。
