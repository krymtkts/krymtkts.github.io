- date: 2026-03-25
  bookTitle: 異文化理解力 相手と自分の真意がわかるビジネスパーソン必須の教養
  pages: 1 ~ 46
  notes: |
    イントロダクション。コミュニケーションギャップの原因を個人の性格だけでなくその根幹の文化的な違いに注目する。
    各国のエグゼクティブから聞き取って集めた特徴を平均化したモデルを作り比較し、コミュニケーションギャップの原因を読み解く。
    このモデルではコミュニケーション・評価・説得・リード・決断・信頼・見解の相違・スケジューリングを軸にした指標で特徴を見る。
    対話する者の間で指標を相対的な評価することで文化の差を理解する。
    これは自分自身の文化を知る助けにもなる。多くは自分がその文化に染まっていることを自覚できない。
    これまた何故買ったか覚えてないが面白そうだったので読む。邦題がバカっぽいのが残念(原題のどこに「ビジネスパーソン必須」があるのか)。
    だがイントロダクションを読んだ感じ良いと思った。
    現職では異文化コミュニケーションが今は無いが、自分が浸かっている文化を理解する上で役立てれるかな。
- date: 2026-03-26
  bookTitle: 異文化理解力 相手と自分の真意がわかるビジネスパーソン必須の教養
  pages: 47 ~ 84
  notes: |
    1 。「空気」の話。
    本章ではローコンテクスト/ハイコンテクストの違いに触れる。
    コンテクストは文脈や言外の意味を持つ程度の話。言語にもその特徴が現れる。
    長く共有した歴史を持つとハイコンテクストな文化になり、また言語や文化の多様性がある国ほどローコンテクストになる。
    単一民族が長く続いた日本と、歴史が数百年かつ移民が成り立ちであるアメリカがその極端な例。
    最も誤解が生じやすいのが異なるハイコンテクストな文化間でのコミュニケーション。文化的多様性があるチームではローコンテクストを徹底する必要がある。
    透明性のあるやり取りがハイコンテクストな文化圏の人にとって信頼の欠如と受け取られないよう、チームの原則として明文化された合意が必要となる。
    アメリカがそうであることを考えたら文化的に多様なチームがローコンテクストになる理由も自然とわかるな。
    文化的に失礼に当たらないよう事前に合意しておくというのは興味深いな。日本人同士でもビジネスで空気の読み違いがあるし、学びになる。
