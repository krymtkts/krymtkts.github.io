- date: 2026-04-01
  bookTitle: 異文化理解力 相手と自分の真意がわかるビジネスパーソン必須の教養
  pages: 241 ~ 268
  notes: |
    7 。見解の相違に対するスタンス。対立して表立って議論を活発に行うか、対立を回避し調和を尊び誰かの面子を失しうる議論を避けるか。
    感情表現豊かだからといって活発に議論を行うとは限らない。対立回避型の文化では上位者が同席すると同調圧力があること、また問題と個人の切り離しが困難であることから、議論が起こりにくい。
    これもわたしが日本的な要素が現代的なビジネスをする上で相性が良くないと思っているところ。長く続くには良いのだけど、旧な変化や破壊的な進化が難しくなる。
    でもここ数年は忖度や慮るということをやめて率直な議論が行われるのが良しとされるし、代わりつつあるのかな。
    とはいえ本書であるような対立回避の文化の人が対立文化の人の振る舞いをマネた場合のトラブルのようなことが良く見てきたな。
    その点でも自分の文化が対立回避型であるという認識はアプローチの助けになりそう。
- date: 2026-04-02
  bookTitle: 異文化理解力 相手と自分の真意がわかるビジネスパーソン必須の教養
  pages: 269 ~ 294
  notes: |
    8 。時間の概念。遅れ・押すことの許容範囲の文化ごとの違い。
    単一的時間(モノクロニック)では時間を具体的なものとして消費・節約し、多元的時間(ポリクロニック)では出来事をつなぐ線のように大幅に柔軟に捉える。
    日常の活動が規則正しく予測可能な国では直線的な時間を軸に、逆に不安定で状況が目まぐるしく変化する国では人間関係によるスケジューリングが重要で時間を柔軟に捉える文化を持つ傾向がある。
    この文化の表出する例として行列がある。直線の行列か「常緑樹」か。
    文化的に多様なチームでは時間に関する明確なルールを合意することができれば誰もがそれに順応できる。時間の文化差で難しい問題は互いの文化を「非効率」なものと考えてしまう点。
    日本はとても時間に厳しいのでこの点良く理解しておく必要があるな。フルリモだとかなり柔軟性があるが、会議などの予定はその限りではないからな。
- date: 2026-04-03
  bookTitle: 異文化理解力 相手と自分の真意がわかるビジネスパーソン必須の教養
  pages: 295 ~ 320
  notes: |
    エピローグ。自分たちの文化は当たり前過ぎて異文化からの見方を想像するのは難しい。しかし自分たちの文化が如何に独特か理解することが議論・理解・学びへとつながる。
    本書はコレで終わり。中々良かった。異文化同士が見た文化的な差異が「怠惰」だとか「不適切」に映るというのは重要なポイントだと思う。
    本書にも書いてる通り文化ごとの平均的な振る舞いをモデル化してるのでステレオタイプな評価であることと、著者の「カルチャーマップ」のデータはサブスクしないと見れなので手が出しにくいのが難点だが、前提を疑う視点を養うという意味では本書で十分と思った。
    IT 関連のアジャイル・マネジメント・リーダーシップなんかの情報は米仕込みのものが多いので、それらの根底にある文化的な前提を知るのと、我々東洋人の持つ文化的バイアスを認識するのに有用。
    2018 年末に買って 2026 年まで積んでたようなので、供養の意味でも良かったｗ
- date: 2026-04-04
  bookTitle: 日本企業がシリコンバレーのスピードを身につける方法
  pages: 1 ~ 42
  notes: |
    まえがき ~ 2 章。
    GE やその他の事例も方法論の根底にある文化的な前提も知った今なら改めて読むほどではないかも知れんが、著者の別の本(内容は染み込んで忘れてしまった)を読んだころに本書も読んだが途中で放棄して積読してたようなので、供養のために読む。
    本書は日本企業が～という話ではあるが、日本企業に限った話でなく変化が急激な時代に前世紀的な効率の経営をしていると時代と噛み合わないという話なのかもな(10 年ほど前の話ではあるが)。
    従業員のエンパワーメント・エンゲージメントといった点も触れられてるが、これまで学んだ内容からは変化に適応できる自律性を自身で獲得できた従業員だけに絞れるかが組織の分岐点になるように思う。
    ここ半年ほど読んできた TEAM OF TEAMS とかユニコーンなんとか等を振り返れば、方法論や手法の信奉では変化に適応しきれない、個々人やチームの内発的動機づけがされるかどうかという話に思える。
    カルチャーマップで見た日本の文化的傾向は、環境の変化に対する適応スピードは低いと見受けられるので、組織文化の合意が肝なんじゃないかな。
    それが契約レベルでも合意されないと、多分敏捷さを得るうえで障害になる。
    それが 20 世紀に培われたもので単に自律性をしなってるだけなのかも知れないが。しらんけど。
