- date: 2026-04-01
  bookTitle: 異文化理解力 相手と自分の真意がわかるビジネスパーソン必須の教養
  pages: 241 ~ 268
  notes: |
    7 。見解の相違に対するスタンス。対立して表立って議論を活発に行うか、対立を回避し調和を尊び誰かの面子を失しうる議論を避けるか。
    感情表現豊かだからといって活発に議論を行うとは限らない。対立回避型の文化では上位者が同席すると同調圧力があること、また問題と個人の切り離しが困難であることから、議論が起こりにくい。
    これもわたしが日本的な要素が現代的なビジネスをする上で相性が良くないと思っているところ。長く続くには良いのだけど、旧な変化や破壊的な進化が難しくなる。
    でもここ数年は忖度や慮るということをやめて率直な議論が行われるのが良しとされるし、代わりつつあるのかな。
    とはいえ本書であるような対立回避の文化の人が対立文化の人の振る舞いをマネた場合のトラブルのようなことが良く見てきたな。
    その点でも自分の文化が対立回避型であるという認識はアプローチの助けになりそう。
- date: 2026-04-02
  bookTitle: 異文化理解力 相手と自分の真意がわかるビジネスパーソン必須の教養
  pages: 269 ~ 294
  notes: |
    8 。時間の概念。遅れ・押すことの許容範囲の文化ごとの違い。
    単一的時間(モノクロニック)では時間を具体的なものとして消費・節約し、多元的時間(ポリクロニック)では出来事をつなぐ線のように大幅に柔軟に捉える。
    日常の活動が規則正しく予測可能な国では直線的な時間を軸に、逆に不安定で状況が目まぐるしく変化する国では人間関係によるスケジューリングが重要で時間を柔軟に捉える文化を持つ傾向がある。
    この文化の表出する例として行列がある。直線の行列か「常緑樹」か。
    文化的に多様なチームでは時間に関する明確なルールを合意することができれば誰もがそれに順応できる。時間の文化差で難しい問題は互いの文化を「非効率」なものと考えてしまう点。
    日本はとても時間に厳しいのでこの点良く理解しておく必要があるな。フルリモだとかなり柔軟性があるが、会議などの予定はその限りではないからな。
- date: 2026-04-03
  bookTitle: 異文化理解力 相手と自分の真意がわかるビジネスパーソン必須の教養
  pages: 295 ~ 320
  notes: |
    エピローグ。自分たちの文化は当たり前過ぎて異文化からの見方を想像するのは難しい。しかし自分たちの文化が如何に独特か理解することが議論・理解・学びへとつながる。
    本書はコレで終わり。中々良かった。異文化同士が見た文化的な差異が「怠惰」だとか「不適切」に映るというのは重要なポイントだと思う。
    本書にも書いてる通り文化ごとの平均的な振る舞いをモデル化してるのでステレオタイプな評価であることと、著者の「カルチャーマップ」のデータはサブスクしないと見れなので手が出しにくいのが難点だが、前提を疑う視点を養うという意味では本書で十分と思った。
    IT 関連のアジャイル・マネジメント・リーダーシップなんかの情報は米仕込みのものが多いので、それらの根底にある文化的な前提を知るのと、我々東洋人の持つ文化的バイアスを認識するのに有用。
    2018 年末に買って 2026 年まで積んでたようなので、供養の意味でも良かったｗ
- date: 2026-04-04
  bookTitle: 日本企業がシリコンバレーのスピードを身につける方法
  pages: 1 ~ 42
  notes: |
    まえがき ~ 2 章。
    GE やその他の事例も方法論の根底にある文化的な前提も知った今なら改めて読むほどではないかも知れんが、著者の別の本(内容は染み込んで忘れてしまった)を読んだころに本書も読んだが途中で放棄して積読してたようなので、供養のために読む。
    本書は日本企業が～という話ではあるが、日本企業に限った話でなく変化が急激な時代に前世紀的な効率の経営をしていると時代と噛み合わないという話なのかもな(10 年ほど前の話ではあるが)。
    従業員のエンパワーメント・エンゲージメントといった点も触れられてるが、これまで学んだ内容からは変化に適応できる自律性を自身で獲得できた従業員だけに絞れるかが組織の分岐点になるように思う。
    ここ半年ほど読んできた TEAM OF TEAMS とかユニコーンなんとか等を振り返れば、方法論や手法の信奉では変化に適応しきれない、個々人やチームの内発的動機づけがされるかどうかという話に思える。
    カルチャーマップで見た日本の文化的傾向は、環境の変化に対する適応スピードは低いと見受けられるので、組織文化の合意が肝なんじゃないかな。
    それが契約レベルでも合意されないと、多分敏捷さを得るうえで障害になる。
    それが 20 世紀に培われたもので単に自律性をしなってるだけなのかも知れないが。しらんけど。
- date: 2026-04-05
  bookTitle: 日本企業がシリコンバレーのスピードを身につける方法
  pages: 43 ~ 80
  notes: |
    3 章。アジャイルやリーンスタートアップの話。顧客第一主義と試行錯誤の繰り返しとが今も最重要なのは変わらないと思う。
    とはいえ、本質はスクラムのような方法論や手法の導入でなくて、敏捷性を持ちつつ自己変革していくナニカをやるのが筋なんじゃないかな。
    「ユニコーン企業のひみつ」なんかもそのようだし、他社の事例を見てもそう思える。
    当然はじめのうちは守破離の守が必要なわけだが、デマルコ本でも方法論を信奉する危険性は触れられてたしな。容量用法をわきまえる必要がある。
    DevOps は最低限必要、 MSA は組織規模に応じて、じゃないかな。今や AI の力も借りて NoOps に寄せやすくはなってると思うけど組織内の能力差もあるし個人的にはできてないなあ。
- date: 2026-04-06
  bookTitle: 日本企業がシリコンバレーのスピードを身につける方法
  pages: 81 ~ 140
  notes: |
    4 ~ 5 章。顧客第一主義の延長線にある運用の話として、問題空間にフォーカスするためのビジネスモデルキャンバスと OKR の紹介。ワークフロー全体最適の手法としてカンバン。
    初手としての方法論や手法の導入って文脈。
    ピツニーボウズ、何かで見たと思ったら GE の本で Predix の事例で載ってたんだ。変化を積極的に取り込む企業の例みたいな感じか。
    OKR は昔本を読んで理想的な OKR 運用はイメージしてるが、実際多くの会社は目標管理と雇用条件を連動させるので、組織への依存度が高い多くの従業員は身を守るために挑戦的で派手な目標を立てて焦点を定めるのが難しくなる。
    カンバンはあと個人的にフォーマットは使うが WIP 制限はやめた。
    AI 時代になりそれまでより大量のタスクを並行で捌く必要がでたことから「誰かに仕事を渡す」という意味でのカンバンは有用無ままだろうけど、一人あたりの仕事量が爆増した今、むしろ WIP 制限をなくして大量の WIP をどううまく回すかが重要な気がしてる。仕掛中というか弱火でコトコト煮込むって感じのイメージ。
- date: 2026-04-06
  bookTitle: ファスト&スロー あなたの意思はどのように決まるか？
  pages: 110 ~ 130
  notes: |
    5 章。認知容易性。システム 1 は慣れたものをそのまま信じて、システム 2 も怠け者なのでそのまま信じてしまう。それが錯覚。
    単純接触効果や認知容易性に関しては条件や効果の大きさなどで疑義はあれど、いまも再現性あるものとして理解されてるみたい。
    ここは如何に人が慣れ親しんだものに騙されやすいかという事実を知るための章と捉えるのが良いか。
- date: 2026-04-07
  bookTitle: 日本企業がシリコンバレーのスピードを身につける方法
  pages: 141 ~ 180
  notes: |
    6 章。経済的合理性に基づく判断、トップクラス人材を引きつけるの好条件、という意味で経済性と人間性をリスクペクと書いてる様子。
    特典や人事考課については Netflix の本でも触れられてたな。最高の報酬と挑戦的な仕事の方が特典より効果があるってのと、従来の人事考課は遅すぎるから頻度を上げるという意味でやめたって話。
    個人としては幸い本書にあるような JTC らしい転属・異動みたいな経験はない(転職多いし)。複数の職能横断的なスキルを持つことで花開くこともあるが、それも基礎スキルがちゃんとしてる場合だけやしな。
    もしかしたら日本の転属させたい傾向は、カルチャーマップで見たような包括的な文化やハイコンテクスト・合意ベースの影響あるのかもな。
    サーベイの結果何も組織が行動を起こさないとシニシズムを生むってのも現実に見てきたので認識と合致する。あと諸々書いてるけどこれらは自律性に激振りするのが最善手という現代に合わせた方法であるという認識。
- date: 2026-04-08
  bookTitle: 日本企業がシリコンバレーのスピードを身につける方法
  pages: 181 ~ 240
  notes: |
    7 ~ 8 章。従業員の自律性を引き出すためのリーダーシップの話。それと変化を起こそうという話。 Spotify の事例も出てきた。
    ここでも OKR が制限(組織が目指す方向性に限られた範囲)の中での自由と自律性を促すものとして紹介される。あとサーバントリーダーシップ。
    社長でもリーダーでも、変化を推進することを宣言し、それに準ずる人々を全面的に擁護することも付け加えてほしいところやな。
    本書はコレで終わり。最近色々読んでたから知ってることが多かった。買った当時に読んでたらまだ良かったかもな(途中から積んでたが)。
- date: 2026-04-09
  bookTitle: クリエイティブプログラマー 創造的なプログラミングのための 7 つのテーマ
  pages: i ~ xx, 1 ~ 20
  notes: |
    序文 ~ 1 章。 1 章が「はじめに」みたいな感じで以降の章の進め方をまとめている。
    謝辞でリファクタリング・ウェットウェア(Pragmatic Thinking & Learning)に触れられてて期待できそう。
    著者自身により洋の東西で文化的に創造性に対する考えが違うのに触れられているのは親切(内容は西洋のものだがとのこと)。
    創造性とは何なのか。教科書的回答の 1 つは、斬新で独創的・目の前の課題と関連しているアイデア。創造性は社会評価的で時間や場所の影響を受け、ものによって評価もされない。
    いま創造性が求められるのは、問題を解決・発見するため、チームワーク、楽しいから。
    Pixar の本のクリエイティブ・創造的って芸術とかの狭義ものより広義なものっぽくてなんだろうと思ってたが、本書の定義のように汎化されたものが提示されてるとしっくりくるな。
- date: 2026-04-10
  bookTitle: クリエイティブプログラマー 創造的なプログラミングのための 7 つのテーマ
  pages: 21 ~ 54
  notes: |
    2 章。創造性は情報の input から始まる。注意深い観察・ツェッテルカステン・前例から学ぶ。
    創造性を生み出すインスピレーション主義者・状況主義者・構造主義者といった異なるアプローチのうち、構造主義的アプローチは自分の専門領域を超えた広範な知識を得て、再構成して内面化し、そこから行動を起こす。
    ただし豊富な知識が「知識プライミング」となり創造性を潰すこともある。メモ→メメックス→ジェネックス。
    思い出させてくれる、思いも寄らない関連を見つける、そういうメモが創造性を刺激する。
    著者はアナログを好むらしい。わたしも PAA(Personal Analog Assistant) に憧れ昔 10 年くらいは Moleskine に万年筆でメモってた。が使いきれなかったり検索性に問題あったしでデジタルに移った。
    Obsidian もマインドマップもしっくり来なくてただの Markdown に書いてる。エクソセルフとして機能してりゃ何でも良いが、メモが上手い人のことは羨ましい。
    どうもあとの方で「スペシャリスト VS ジェネラリスト」に触れてるらしくて楽しみ。ジェネラリストは知識の相乗効果でスペシャリストになるねんよな。
- date: 2026-04-11
  bookTitle: クリエイティブプログラマー 創造的なプログラミングのための 7 つのテーマ
  pages: 55 ~ 88
  notes: |
    3 章。集団的創造性。協力的なチームワークが創造性を高める。カメラータの特徴、共有された問題・個々の知識の共有・生きた学習するシステム＝シンマセシー(symmathesy)・批判的。
    創造的なアイデアは、異なるアイデアと衝突する液体ネットワークから生まれる。
    創造性は時間の制約を受ける。イノベーション曲線のように、最初は受け入れられず伝播に時間がかかる。
    集団内の創造性の伝染に関して触れられてた。知ってるけどわたしはあまり信用してない。感染源が少なかったり受容体が少なかったりする場合はまず起こったことがない。
- date: 2026-04-12
  bookTitle: クリエイティブプログラマー 創造的なプログラミングのための 7 つのテーマ
  pages: 89 ~ 132
  notes: |
    4 章。適度な制約のもとで創意工夫が必要になり創造性に繋がる話。制約は環境や自発的に課すでさえも創造性を高めるのにつながる。
    制約にぶつかったとき、あえてナイーブなアプローチをとることで、創造性が発揮されることもある。
    制約が厳しい関数型プログラミング言語を使うのも似たような理由かなーと思ったら例に Go が書かれてた。コードゴルフなんかもそうなんやろな。
    文中で興味深かったのは、スタートアップらしい早くリリースする話も制約と捉えれる点かな。
    バッチサイズやリードタイムが決まっているとその中に収まる仕事をすると思ってたが、あえてそこに挑戦するということなのかな。
    小さなチーム～は読んでたけどそこまで意識はいってなかったな。
- date: 2026-04-13
  bookTitle: クリエイティブプログラマー 創造的なプログラミングのための 7 つのテーマ
  pages: 133 ~ 164
  notes: |
    5 章。創造的な成果を得るには創造的思考と批判的思考の両方が必要。
    創造的プロセスは、準備・培養・発現・検証・提示/需要の段階を非直線的に行ったり来たりする。
    集中モードと拡散モード、眼の前の問題にズームした分析と、より広い範囲から問題の様々な側面に対するアプローチ。
    創造性自体は目標になる可能性はあるが、一般には問題解決における手段である点に注意。批判的思考も時代の空気や認知バイアスの影響下にあることを理解する。
    批判的思考が厳しすぎると最終的に創造的な思考も減少させてしまうリスクも有る。
    集中しすぎると認知トンネリングにより収穫逓減が始まるというのは面白いな。 stop-and-go が必要なのか。
    自己表現のクリエイティブコーディングという言葉が適切な選択ではないというのも面白い。実際この本をタイトルで買うとどっちかわからない。
    集中と拡散も、創造と批判も、要はバランスというのが難しいところやな。この辺はプラクティスとして言われてる内容とも合致する。
- date: 2026-04-14
  bookTitle: クリエイティブプログラマー 創造的なプログラミングのための 7 つのテーマ
  pages: 165 ~ 202
  notes: |
    6 章。好奇心が創造性を導く。硬直(FIXED)マインドセットとしなやか(GROWTH)マインドセット。
    変化が可能であることを信じ挑戦を避けず挫折に耐えて努力する。コンフォートゾーンから抜け出す。言語や技術の切替程度ではコンフォートゾーンを抜け出してない。
    好奇心を持ち続ける。 GRIT 。些細な決断すらも意志力を消耗する。自我消耗(ego depletion)。
    時間とともにモチベーションが下がるとか報酬が発生しない問題解決を続けられるかという点で、内発的と外発的動機付けの両方があってこそ創造性が生まれるといえる。
    マルチポテンシャライト(multipotentialite)が創造性につながると同時に専門性の危機。
    液体ネットワークが示していたように偶然の刺激が創造的なアイデアの発露につながる。セレンディピティ(serendipity)。予期せぬ発見が価値を持つ。
    結局のところプログラミングのコンフォートゾーンから抜け出すって何なんだろ。システムの領域を超えるっってこと？
    内発/外発については、仕事は内発的に問題解決を楽しむ問題解決のきっかけをもらってるものだという理解。仕事上の付き合いだけの言語や技術も多い。
    不誠実さに繋がる可能性という創造性のダークサイドも興味深い。「資格取得による専門主義は、あなたのキャリアを発展させる役にはほとんど立ちません。」わろた。
    本書はところどころ心理学のトピックを扱ってるから、それが再現性のあるものなのかはちょっと注意して読む必要があるな。
    ただ、古代からヒトが創造性を高めるためにやってきて効果を得ているものもあるから、そこに何らかの認知の仕組みがあるのは確かやろうな。
- date: 2026-04-15
  bookTitle: クリエイティブプログラマー 創造的なプログラミングのための 7 つのテーマ
  pages: 203 ~ 240
  notes: |
    7 章。創造的な心の状態。正しい創造モード。潜在的自我。 Shower thoughts 。
    適切な強度の問題とスキルのバランスが最適経験またはフローへ導く。過度なプレッシャーはフローを不安に変える。
    高い認知的負荷で限界に追い込むような活動であるディープワークはフローの一部と言える。
    良い習慣は無意識に浸透することで意志力の消耗を減らす。ディープワークも同様にできる。
    創造性を得る心の状態は環境の影響も大きいがそれは主観的なものである。例えば、飛行機やドライブ、散歩。往々にして見られるそれらに対する第三者の理解の欠如。
    フロー中断の悪影響。避けられない中断の対策としてレトロスペクティブ分析ツール(ポモドーロ等)とコンテキストスイッチの削減。
    最も影響が大きい自己中断に対抗する術は集中力を高めること。マインドフルネスがそれを訓練できる可能性がある。
    点を集め、繋げる。情報を集めるのはみんなで、洞察を得るのは個人で。睡眠・カフェインのような精神刺激物。
    集中と拡散を設計された創造性を刺激する環境、作業スペース。
    創造性を高めるのに必要な要素に対する不理解はどこでも蔓延してるんやな。現職はフルリモもあって理解があるから救われてる側なのか。
    閃きが突然訪れるものでないというのは体感と一致してる。水面下から頭を出してくる感覚に近い。
- date: 2026-04-16
  bookTitle: クリエイティブプログラマー 創造的なプログラミングのための 7 つのテーマ
  pages: 241 ~ 272
  notes: |
    8 章。創造的な行動を促すためのテクニック。プログラミングとアートの類似性。アートベース学習。
    良い盗みと悪い盗みを隔てるのは敬意と再編集すること。悪い盗みの例として GitHub Copilot の OSS license 違反したコード生成。休暇を取ること。
    著名人のツールボックスにも、本書で触れられる、情報収集・領域を超えた知識の衝突によるインスピレーション、記録と内面化、習慣等の特徴が見て取れる。
    調べたところまだこの OSS license の件はいくつかは解決してないみたい。 Organization の設定でも public code と重複する場合に出力を reject できる機能があるし、そういうことなんやろな。わたしもそうしてる。
    休暇は取れるだけ取りたいけど、結局休暇中も読書や趣味プロの習慣があるし、それらが仕事と自分に距離を置くポイントでもあるから、休暇じゃないといけない絶対の理由はないかもな。
    空き時間が増える点は余裕があっていいけど、習慣のフローで時間が溶けるのも早いし、いくらあっても足りなそう。
    ラバーダックは最近 GitHub Copilot CLI の一部に組み込まれたし、計算神経科学じゃあないけどヒトと AI の創造性を刺激するプラクティスは共通するのかもな。
- date: 2026-04-17
  bookTitle: クリエイティブプログラマー 創造的なプログラミングのための 7 つのテーマ
  pages: 273 ~ 298
  notes: |
    9 章。創造性は習得できるスキル。ただし単純化されたベストプラクティスに飛びつくのは効果が得られない危険がはらむ。
    経験の多寡による創造性の違いと様々な経験をもったチームで協力することの創造性への刺激の可能性。
    集中し続けることでの燃え尽き症候群のリスク。そしてあとは実践あるのみ。
    本書はコレで終わり。方向性としてはヒトの脳の可能性を最大化できる可能性を示していて、わたしの好きなリファクタリング・ウェットウェアと同じ方向性を持つ。
    ただ今となっては自分の心理学的な理解が多少深まったのもあって実験の再現性の問題も知ったし、そういう意味では本書で触れられてる実験には一部注意を促しているものもあったけど、全てを裏付けの確認なしに真に受けるのは危険な気もした。
    ただ前にも触れたけど古代からヒトが連綿と続けてきた創造性を育む営みにも本書でいう同じパターンが見られるし、有効な手段の 1 つとして理解し実線する価値はあると思った。既に実践していたものもあろうし。
    本書を買ったのはてきとーに Manning だから買っとこみたいな雑な動機だったが、買ってよかったな。雰囲気ちょっと軽いけどいい本だと思った。
