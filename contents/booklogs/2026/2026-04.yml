- date: 2026-04-20
  bookTitle: クリエイティブプログラマー 創造的なプログラミングのための 7 つのテーマ
  pages: 76 ~ 157
  notes: |
    第 4 章。インフォドゥードル。パーソナル、パフォーマンス、グループがある。自分用か、聴衆がいるか、グループでやるか。
    才能がないと絵が描けない、ラクガキは知的・まじめじゃない、ビジュアルはアーティストのためのものだという嘘や思い込みを取っ払って考える。
    12 のテクニック。タイポグラフィ・フォント・ワードピクチャー・キャプション・つなぐもの・わけるもの・フレーム・弾丸・シャドウ・シェーディング・顔・人物像。それと色の使い方。
    インフォドゥードルは個々人が持つ情報に形を与えの共有してその人の世界を広げる。システム・プロセス・比較の 3 つのフレームワーク。
    インフォドゥードルの情報分析の原則。(たいてい)ビジュアルより先に言葉がある。余分なものの削除を行う。削除するには聞く「筋肉」を鍛える必要がある。
    どの章も繰り返し練習しようという話書かれてていいな。また手書きがうまくならないなら諦めて他のことをやろうとも本章では書かれてる。
    ビジュアル・ボキャブラリーを増やすというのもいい。練習と語彙がないと使えないからな。この章はパターンが多いし「使って慣れろ」なわけか。
    視覚イメージにバイアスがかかったシンボルを選んだ場合のことも触れられてて親切。
