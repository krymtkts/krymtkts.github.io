    マインドマップを勉強した頃に買ったけど 10 年以上積んでた。個人的に言語型なので別の観点のヒントも得たいし供養のために読む。
    フォントやレイアウトがコロコロ変わるからパターンを読みにくく、本自体も横長で頁がつかみにくい。
    読んでてじわじわストレスが溜まるが、そういうのを気にしない人たちの本なんやろなという気もするし楽しみつつ読む。
    本書は視覚を最大限活用して思考しようという話な気がする。視覚を文字で埋め尽くしてる場合と何が違うのかはこれから読んでいって実践したらわかるかな？
    著名人の広義のドゥードルも載ってるけど、これは創造性の発揮における培養のプロセスであると考える方が妥当そう。
    個人としては視覚的に思考するタイプじゃあないのでその辺の折り合いがつくかも気になる。
