- date: 2026-06-01
  bookTitle: NHK 3 ヶ月でマスターする 数学
  pages: 90 ~ 109
  notes: |
    第 9 回。確率。確率は直感を裏切る。これはファスト＆スローでも見られるような論理的に考えればすぐわかるけど直感的に正しそうなものが間違ってる例にもなりそう。
    モンティ・ホール問題。巴戦は無限等比数例。 A,B,C の力士だと勝てる確率は 5:5:4 ではじめに戦わない C が不利。
    第 10 回。関数。値を入れたらある規則に基づいて別の値が決まる関係。二次関数をグラフ化して現れる放物線の特性。準線と焦点。放物線は相似。
    音の波形も関数で表せる。アクティブノイズキャンセリングは逆位相の関係にある関数で音を作ってぶつけて消している。これはわかりやすい関数の説明でしたな。
- date: 2026-06-02
  bookTitle: NHK 3 ヶ月でマスターする 数学
  pages: 110 ~ 128
  notes: |
    第 11 回。倍数・約数。数の性質を捉えて簡単な表現に置き換える。代数的な方法。
    素因数分解は公開鍵暗号に利用されている。これは RSA の話。
    第 12 回。推しの紹介。
    4 つの数字で 10 を作る式を考えるテンパズル(make10)は 0 を除く異なる数字の組み合わせが力業で証明されてる。 4 色問題も同様に力業。
    最適停止問題。一見運頼みに見えても数学的に説明がつけられるパターンがありうる。
    仕立て屋さんのパズル。変身図形定理。これとテンパズルは子供と一緒にやってみたいな。
    これで本書は終わり。他にも数学の本を読もうという気になってきたので気張らなくて良い簡単なやつからやってこうと思う。
    次はポストモーテムの本が届いたのでそれをサクッと読む。
- date: 2026-06-03
  bookTitle: ポストモーテム みずほ銀行システム障害事後検証報告
  pages: 1 ~ 46
  notes: |
    はじめに ~ 第 1 章。みずほ銀行は 2021-02 ~ 2022-02 で 11 回の障害を起こした。怒涛の障害ラッシュで金融庁・財務省が行政処分を下した。外為法違反でチェックメイト。
    そこからシステムに求められる resiliency(復元性)を高めるきっかけとなるのが本書の狙い。
    日経コンピュータ的にもみずほ前作で SOA の耐障害性を持ち上げたこともあってその責任を取る必要を感じている。
    目次見てても「なぜ頭取に情報が届かなかったのか」て書いてて、前作で改善するって言ってたやつやん...となっている。金融庁も「社風に問題がある」と指摘してるの的確だ。
    進退をかけて指揮ってインタビューされてた方も引責辞任。その後に作成された再発防止策「システム障害の語り継ぎ」、何も社風改善する気ないだろこれ。フォークロアじゃないんやから。エンジニアリングを諦めてるやん。
    本書というかこのシリーズを読むにあたり、あと勝ち的な意見になる点だけは注意したい。
    ただ前作を読んだ時にも思った、エンジニアリングで対処してない点・システムそれ自身より技術への解像度や変化への適応といった組織的な問題ってのは、当たってたな。
    にしても「重要な試験の受験を見送った」て何なんだろ。これに 5000 円の QUO カードか...場合によっては人の人生歪めたのに対し安すぎやせんか。その点でも引くな。
- date: 2026-06-04
  bookTitle: ポストモーテム みずほ銀行システム障害事後検証報告
  pages: 47 ~ 106
  notes: |
    第 2 章。2021-02 ~ 2022-02 までに起こった 11 の障害の説明。
    ハードウェアが故障するのも何故か障害が連鎖するのも経験から知っているが、ちょっと重大事故が多すぎる気がするな。
    原因としては、通常運用時の情報共有の未熟さ、障害対応体制の不備、マニュアル変調で自律性のない現場力、設定の不整合に気づけない大局観のなさ。
    特に、リハーサルで見つかった問題に対応しないのってわたしは好きじゃない言葉だが技術的負債、所謂先延ばしってことだと思うが、複数回その現象を見て先送りするってどういう判断なんだろ。
    負荷試験にもならない試験をやってたのも気になる。概ね考えられる理由としてはチームが成熟するまで人員を維持できない仕組みが組織にあるんだろな。
    ジョブローテーションが人脈開発につながるからとか、コスト圧縮とか、あるいは前作でもあったけど失敗の報告を悪しきものとする組織文化なんかなあやっぱり。
- date: 2026-06-05
  bookTitle: ポストモーテム みずほ銀行システム障害事後検証報告
  pages: 107 ~ 168
  notes: |
    第 3 章。わずか 1 年間に 11 の重大な障害を起こし、かつ軽微な障害が重大化した理由を考察。
    使用している技術要素に対する解像度の低さ。時代遅れの仕様の維持。単一障害点をはらむ分散トランザクション設計の不備。運用監視体制の貧弱さ。運用監視の組織分断によるコミュニケーションエラー。
    障害管理体制の設計不備。緊急事態でも局所最適化が合理的となる組織構造。機器の刷新を怠り故障率が上昇。
    これらは現象であるので、この原因としてはやはり前作から垣間見えたエンジニアリングの放棄じゃないかな。
    組織的に事業の根幹であるシステムを軽んじてるからシステムに対するオーナーシップが醸成されてなかったのも運用が会社間で分断されてることから読み解ける気がする。
    確証バイアスあるけど、前作で想像したとおりではあるな。やはり組織文化が変わってないことで失敗を繰り返しながらも学習を放棄してるんだろうな。
    失敗の本質で触れられてたような話を未だにやってたというのがすごいな。
- date: 2026-06-06
  bookTitle: ポストモーテム みずほ銀行システム障害事後検証報告
  pages: 169 ~ 312
  notes: |
    第 4 章 ~ おわりに 。5 章は原作の障害部分とほぼ同じで暇な感じ。後半かなりおもんないので早足で読んだ。本書はコレで終わり。
    金融庁による原因の指摘。大体予想通りやが、役員の知識不足、専門性のない CIO を指名した責任とか、一段辛らつやな。
    真因として指摘される、やるべきことをやらない/言われたことしかやらない、というのは自律性を発揮しないことが合理的になる組織力学、例えば恐怖による支配なんかが働いていたと考えるのが妥当やろな。
    DevOps を理解していないのは組織構造からも鮮明やし。ただ本書では急に SRE に飛び級しようとしてるのはは危ないんじゃないかな。マインドが整わないままプラクティスだけ導入して失敗するのはよくあるケースな気がする。
    同様の同業種の大規模障害は国内国外共にあるが、連続して発生するのはみずほだけ。
    その理由としてずっと指摘されているシステム軽視・社会影響と顧客軽視の姿勢というのは理屈が通るな。
    失敗の原因の分析は金融庁のレポートより先に踏み込んでないし、この本が新しく付け加えた内容はほぼないんだろうなと思った。
    技術組織の運営に留まらず広く企業のあり方の問題なので難しいことはわかるが、ちょっと浅いなという感想。
    コレは本書と関係ないが、今回中古で 450 円で「良い」のコンディションを買ったけど食べ零しのような汚れや痛み多くて過去一汚かった。値段相応ということかな。保存用にまた買うか？でもそんなに面白い本じゃないしな...
- date: 2026-06-07
  bookTitle: 数学図鑑 やりなおしの高校数学
  pages: 1 ~ 19
  notes: |
    NHK の数学の本を読んだときに広告に載ってたので買った。高校数学で躓いたヒトなのでちょいど良いかな的な。
    はじめに ~ 第 1 章。集合と論理。この辺はプログラミングを仕事にし出してから自分で本を読んでわかるようになったので本書の内容も理解できなくて苦しいところはない。
    しかし∩(cap)∪(cup)を見て改めて∈(属する/element of)、∉(属さない/not an element of)の読み方、 A̅(A bar) が A^c とかを調べた。覚えとこ。
    しかし本書結構淡白に進むな。わかるならササッと進むだけだが、わからないとわからないままサラリと終わってしまう気もした。わからないところが見つかるまで進んでみるか。
- date: 2026-06-08
  bookTitle: 数学図鑑 やりなおしの高校数学
  pages: 20 ~ 41
  notes: |
    第 2 章。場合の数と確率。
    場合の数。順列(Permutation)、組み合わせ(Combination)、重複順列(repeated permutation)、重複組合せ(repeated combination)。
    わたしは P とか C とか覚えられないヒトだが英語が分かれば記憶に定着しやすい。 H の Homogeneous product は由来が難しいとのことで自習対象やな。
    因みに調べたところ P とかの表記記号は日本ローカルな感じで世界では二項係数がメジャーらしい。これも宿題。
    確率。諸々の言葉を覚える。試行(trial)・標本空間(sample space)・事象(event)。同様に確からしい。積事象(product event)と和事象(sum event)。排反事象(exclusive event)。確率の加法定理(addition formula)。独立(independent)。
    余事象(complementary event)・反復試行(repeated-trials)。条件付き確率(confitional probability)・確率の乗法定理(multiplication rule)。ベイズの定理(Bayes' theorem)
    反復試行以降は式を見てふんわりわかったつもりになってそうなのでしっかり解いて理解しよう。今のところは面白くわかったつもりになってると思う。わかったかどうか測る術も必要なので問題を解くしかないかな。
- date: 2026-06-09
  bookTitle: 数学図鑑 やりなおしの高校数学
  pages: 42 ~ 75
  notes: |
    第 3 章。関数(数Ⅰ、数Ⅱ)。
    関数の基礎にはじまり、 2 時間数・三角関数・指数関数・対数関数。
    三角関数くらいから証明や確認の数式がどばーっと並べられるところが出てきてそれらは追えなかった。
    関数(function)は確かに古い計算機科学の本で函数と書かれてた。覚えてない言葉がめちゃくちゃ増えたので 1 つずつ覚える。
    独立変数(independent variable)・従属変数(dependent variable)・定義域(domain)・値域(range)・平方完成(completing the square)・三角関数(trigonometric function)・弧度法(radian)・負角・余角・指数法則(exponential low)・累乗根(radical root)・底(base)・対数法則(logarithm low)・底の交換公式(change of base formula)・常用対数(common logarithm)。
    地味に平方根が square root だから `sqrt` かあというのを改めて理解した。レベルがしょぼすぎるのがあれやが 1 つずつやり直しや。
    なんとなく自分の認知特性として記号の操作が頭に入ってこないみたいなので地道にパターンが刻まれるまでそれが何であるか追うのが良い気がしてきてる。時間がかかるなあこりゃ。
