- date: 2026-06-01
  bookTitle: NHK 3 ヶ月でマスターする 数学
  pages: 90 ~ 109
  notes: |
    第 9 回。確率。確率は直感を裏切る。これはファスト＆スローでも見られるような論理的に考えればすぐわかるけど直感的に正しそうなものが間違ってる例にもなりそう。
    モンティ・ホール問題。巴戦は無限等比数例。 A,B,C の力士だと勝てる確率は 5:5:4 ではじめに戦わない C が不利。
    第 10 回。関数。値を入れたらある規則に基づいて別の値が決まる関係。二次関数をグラフ化して現れる放物線の特性。準線と焦点。放物線は相似。
    音の波形も関数で表せる。アクティブノイズキャンセリングは逆位相の関係にある関数で音を作ってぶつけて消している。これはわかりやすい関数の説明でしたな。
- date: 2026-06-02
  bookTitle: NHK 3 ヶ月でマスターする 数学
  pages: 110 ~ 128
  notes: |
    第 11 回。倍数・約数。数の性質を捉えて簡単な表現に置き換える。代数的な方法。
    素因数分解は公開鍵暗号に利用されている。これは RSA の話。
    第 12 回。推しの紹介。
    4 つの数字で 10 を作る式を考えるテンパズル(make10)は 0 を除く異なる数字の組み合わせが力業で証明されてる。 4 色問題も同様に力業。
    最適停止問題。一見運頼みに見えても数学的に説明がつけられるパターンがありうる。
    仕立て屋さんのパズル。変身図形定理。これとテンパズルは子供と一緒にやってみたいな。
    これで本書は終わり。他にも数学の本を読もうという気になってきたので気張らなくて良い簡単なやつからやってこうと思う。
    次はポストモーテムの本が届いたのでそれをサクッと読む。
